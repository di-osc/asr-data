name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string
      publish_pypi:
        description: "Publish wheels to PyPI"
        required: true
        default: true
        type: boolean
      publish_crates:
        description: "Publish Rust crate to crates.io"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag and verify versions
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.event.release.tag_name }}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Tag must look like v0.1.0, got: $tag" >&2
            exit 1
          fi

          version="${tag#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          py_version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -n 1)"

          if [[ "$cargo_version" != "$version" || "$py_version" != "$version" ]]; then
            echo "Version mismatch: tag=$version Cargo.toml=$cargo_version pyproject.toml=$py_version" >&2
            exit 1
          fi

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag not found: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-wheels:
    name: Wheels (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            manylinux: "auto"
          - os: macos-latest
            manylinux: ""
          - os: windows-latest
            manylinux: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: dtolnay/rust-toolchain@stable

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --find-interpreter
          manylinux: ${{ matrix.manylinux }}
          sccache: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*

  build-sdist:
    name: Source Distribution
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*

  upload-release-assets:
    name: Upload Release Assets
    needs: [prepare, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: dist

      - name: Upload artifacts with GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No artifacts to upload" >&2
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber --repo "${{ github.repository }}"

  publish-pypi:
    name: Publish PyPI
    if: github.event_name == 'release' || inputs.publish_pypi
    needs: [prepare, upload-release-assets]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-crates:
    name: Publish crates.io
    if: github.event_name == 'release' || inputs.publish_crates
    needs: [prepare, upload-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Check crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN is empty."
            echo "Add a repository secret named CARGO_REGISTRY_TOKEN:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            echo "Value: a crates.io API token with publish permissions."
            exit 1
          fi

      - name: Publish asr-data
        run: cargo publish -p asr-data --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
